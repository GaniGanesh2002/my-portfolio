<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ganesh Gosangi — Data Analyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --ink:       #0d0f14;
  --ink-2:     #3d4252;
  --ink-3:     #7a8094;
  --rule:      #e4e7ef;
  --surface:   #f6f7fb;
  --white:     #ffffff;
  --accent:    #2563eb;
  --accent-lt: #eff4ff;
  --accent-md: #bfcffe;
  --success:   #059669;
  --success-lt:#d1fae5;
  --warn:      #d97706;

  --f-display: 'DM Serif Display', Georgia, serif;
  --f-body:    'DM Sans', system-ui, sans-serif;
  --f-mono:    'JetBrains Mono', monospace;

  --r:  8px;
  --r2: 14px;
  --sh: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
  --sh2:0 2px 8px rgba(0,0,0,.05), 0 12px 40px rgba(0,0,0,.09);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--f-body);
  color: var(--ink-2);
  background: var(--white);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

/* ═══════════════════════════════════════════
   LAYOUT HELPERS
═══════════════════════════════════════════ */
.wrap { max-width: 1080px; margin: 0 auto; padding: 0 40px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
#nav {
  position: fixed; inset: 0 0 auto 0; z-index: 200;
  height: 62px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(18px) saturate(180%);
  border-bottom: 1px solid var(--rule);
  transition: box-shadow .3s;
}
#nav.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,.08); }
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--f-body); font-weight: 600; font-size: 15px; color: var(--ink);
}
.nav-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: .5; transform: scale(.8); }
}
.nav-links { display: flex; gap: 6px; }
.nav-links a {
  font-size: 13.5px; font-weight: 500; color: var(--ink-3);
  padding: 6px 14px; border-radius: 20px;
  transition: color .2s, background .2s;
}
.nav-links a:hover, .nav-links a.active {
  color: var(--accent); background: var(--accent-lt);
}
.nav-cta {
  font-size: 13px; font-weight: 600; color: var(--white) !important;
  background: var(--ink) !important; padding: 8px 18px !important;
  border-radius: 20px !important;
  transition: background .2s, transform .15s !important;
}
.nav-cta:hover { background: var(--accent) !important; transform: translateY(-1px) !important; }

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
#hero {
  min-height: 100svh;
  display: grid; place-items: center;
  padding: 100px 40px 80px;
  background: var(--white);
  position: relative; overflow: hidden;
}
/* Signature element: a fine data-grid watermark in the background */
#hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--rule) 1px, transparent 1px),
    linear-gradient(90deg, var(--rule) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: .35;
  pointer-events: none;
}
#hero::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(255,255,255,.0) 0%, var(--white) 75%);
  pointer-events: none;
}
.hero-inner {
  position: relative; z-index: 1;
  max-width: 820px; text-align: center;
}
.hero-chip {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--accent-md); background: var(--accent-lt);
  color: var(--accent); font-size: 12px; font-weight: 600;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 6px 16px; border-radius: 20px; margin-bottom: 32px;
}
.hero-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
.hero-h1 {
  font-family: var(--f-display);
  font-size: clamp(44px, 8vw, 82px);
  line-height: 1.06; letter-spacing: -.5px;
  color: var(--ink); margin-bottom: 24px;
}
.hero-h1 em { color: var(--accent); font-style: italic; }
.hero-sub {
  font-size: clamp(15px, 2vw, 17px);
  color: var(--ink-3); max-width: 520px; margin: 0 auto 40px;
  font-weight: 300; line-height: 1.8;
}
.hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 72px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--f-body); font-size: 14px; font-weight: 600;
  padding: 13px 28px; border-radius: var(--r); border: none;
  cursor: pointer; transition: all .2s;
}
.btn-dark  { background: var(--ink); color: var(--white); }
.btn-dark:hover  { background: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,99,235,.35); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--rule); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

.hero-metrics {
  display: inline-flex; gap: 0;
  border: 1px solid var(--rule); border-radius: var(--r2);
  overflow: hidden; background: var(--white);
  box-shadow: var(--sh);
}
.metric {
  padding: 20px 36px; text-align: center;
  border-right: 1px solid var(--rule);
}
.metric:last-child { border-right: none; }
.metric-val {
  font-family: var(--f-display);
  font-size: 32px; color: var(--ink);
  line-height: 1; margin-bottom: 4px;
}
.metric-val em { color: var(--accent); font-style: normal; }
.metric-lbl { font-size: 12px; color: var(--ink-3); font-weight: 500; letter-spacing: .04em; }

/* ═══════════════════════════════════════════
   SECTION SHELL
═══════════════════════════════════════════ */
.section { padding: 100px 0; }
.section--gray { background: var(--surface); }
.section-label {
  font-family: var(--f-mono); font-size: 11px; font-weight: 500;
  color: var(--accent); letter-spacing: .14em; text-transform: uppercase;
  margin-bottom: 14px;
}
.section-title {
  font-family: var(--f-display);
  font-size: clamp(30px, 4vw, 42px);
  color: var(--ink); line-height: 1.15;
  margin-bottom: 14px;
}
.section-desc { font-size: 15px; color: var(--ink-3); max-width: 480px; line-height: 1.8; margin-bottom: 56px; }

/* ═══════════════════════════════════════════
   ABOUT
═══════════════════════════════════════════ */
.about-layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 80px; align-items: start; }
.about-body p { font-size: 15.5px; line-height: 1.85; color: var(--ink-2); margin-bottom: 18px; }
.about-body p strong { color: var(--ink); font-weight: 600; }

.about-card {
  background: var(--white); border: 1px solid var(--rule);
  border-radius: var(--r2); padding: 32px; box-shadow: var(--sh);
  margin-bottom: 20px;
}
.about-card-head {
  font-family: var(--f-mono); font-size: 10px; font-weight: 500;
  color: var(--ink-3); letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--rule);
}
.info-list { display: flex; flex-direction: column; gap: 14px; }
.info-item { display: flex; align-items: center; gap: 14px; }
.info-ico {
  width: 36px; height: 36px; flex-shrink: 0;
  border-radius: var(--r); background: var(--surface);
  display: grid; place-items: center; font-size: 16px;
}
.info-text-label { font-size: 11px; color: var(--ink-3); font-weight: 500; margin-bottom: 1px; }
.info-text-val   { font-size: 14px; color: var(--ink); font-weight: 500; }

.edu-block { }
.edu-tag { display: inline-block; font-family: var(--f-mono); font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); background: var(--accent-lt); padding: 3px 10px; border-radius: 4px; margin-bottom: 10px; }
.edu-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.edu-meta  { font-size: 13px; color: var(--ink-3); margin-bottom: 14px; }
.chip-row  { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  font-size: 12px; font-weight: 500; color: var(--ink-2);
  background: var(--surface); border: 1px solid var(--rule);
  padding: 4px 11px; border-radius: 20px;
}
.chip.blue { background: var(--accent-lt); color: var(--accent); border-color: var(--accent-md); }

/* ═══════════════════════════════════════════
   SKILLS
═══════════════════════════════════════════ */
.skills-wrap { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
.skill-card {
  background: var(--white); border: 1px solid var(--rule);
  border-radius: var(--r2); padding: 28px 26px;
  box-shadow: var(--sh); transition: box-shadow .22s, transform .22s, border-color .22s;
}
.skill-card:hover { box-shadow: var(--sh2); transform: translateY(-3px); border-color: var(--accent-md); }
.sk-icon {
  width: 44px; height: 44px; border-radius: var(--r);
  background: var(--accent-lt); display: grid; place-items: center;
  font-size: 20px; margin-bottom: 16px;
}
.sk-name { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }
.sk-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.sk-tag {
  font-family: var(--f-mono); font-size: 11px; color: var(--ink-2);
  background: var(--surface); border: 1px solid var(--rule);
  padding: 3px 9px; border-radius: 5px;
}

/* progress bars for proficiency */
.sk-bar-wrap { margin-top: 14px; display: flex; flex-direction: column; gap: 7px; }
.sk-bar-row { display: flex; align-items: center; gap: 10px; }
.sk-bar-label { font-size: 11.5px; color: var(--ink-3); width: 90px; flex-shrink: 0; }
.sk-bar-track { flex: 1; height: 4px; background: var(--rule); border-radius: 2px; overflow: hidden; }
.sk-bar-fill  { height: 100%; background: var(--accent); border-radius: 2px; width: 0; transition: width 1.1s cubic-bezier(.4,0,.2,1); }

/* ═══════════════════════════════════════════
   PROJECTS
═══════════════════════════════════════════ */
.projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.proj-card {
  background: var(--white); border: 1px solid var(--rule);
  border-radius: var(--r2); overflow: hidden;
  box-shadow: var(--sh); transition: box-shadow .22s, transform .22s;
  display: flex; flex-direction: column;
}
.proj-card:hover { box-shadow: var(--sh2); transform: translateY(-4px); }
.proj-card:first-child { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; }
.proj-visual {
  background: linear-gradient(135deg, var(--accent-lt) 0%, #dbeafe 100%);
  min-height: 180px; display: flex; align-items: center; justify-content: center;
  font-family: var(--f-mono); font-size: 11px; color: var(--accent);
  letter-spacing: .04em; padding: 32px; position: relative; overflow: hidden;
}
.proj-visual-code {
  font-family: var(--f-mono); font-size: 12px; line-height: 1.8;
  color: var(--accent); opacity: .75; text-align: left;
}
.proj-body { padding: 28px; flex: 1; display: flex; flex-direction: column; }
.proj-domain {
  font-family: var(--f-mono); font-size: 10px; font-weight: 500;
  color: var(--ink-3); letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 10px;
}
.proj-title {
  font-family: var(--f-display); font-size: 20px; color: var(--ink);
  margin-bottom: 10px; line-height: 1.25;
}
.proj-desc { font-size: 14px; color: var(--ink-2); line-height: 1.8; flex: 1; margin-bottom: 18px; }
.proj-result {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--success-lt); border: 1px solid #a7f3d0;
  border-radius: var(--r); padding: 11px 14px; margin-bottom: 18px;
  font-size: 13px; color: #065f46; font-weight: 500;
}
.proj-result-ico { flex-shrink: 0; margin-top: 1px; }
.proj-stack { display: flex; flex-wrap: wrap; gap: 6px; }
.proj-tag {
  font-family: var(--f-mono); font-size: 11px; font-weight: 500;
  color: var(--accent); background: var(--accent-lt);
  border: 1px solid var(--accent-md); padding: 3px 9px; border-radius: 4px;
}

/* ═══════════════════════════════════════════
   EXPERIENCE / TIMELINE
═══════════════════════════════════════════ */
.timeline { position: relative; padding-left: 28px; }
.timeline::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 0;
  width: 1px; background: var(--rule);
}
.tl-item { position: relative; padding-bottom: 56px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot {
  position: absolute; left: -34px; top: 6px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent); border: 3px solid var(--white);
  box-shadow: 0 0 0 1px var(--accent);
}
.tl-meta {
  font-family: var(--f-mono); font-size: 11px; color: var(--ink-3);
  letter-spacing: .05em; margin-bottom: 8px;
}
.tl-role { font-family: var(--f-display); font-size: 22px; color: var(--ink); margin-bottom: 4px; }
.tl-company { font-size: 14px; font-weight: 500; color: var(--accent); margin-bottom: 18px; }
.tl-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--f-mono); font-size: 10px; font-weight: 500;
  background: var(--success-lt); color: var(--success);
  border: 1px solid #a7f3d0; padding: 3px 10px; border-radius: 12px;
  margin-left: 12px; vertical-align: middle; letter-spacing: .05em;
}
.tl-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--success); }
.tl-bullets { list-style: none; display: flex; flex-direction: column; gap: 11px; }
.tl-bullets li {
  font-size: 14.5px; color: var(--ink-2); line-height: 1.75;
  padding-left: 20px; position: relative;
}
.tl-bullets li::before {
  content: ''; position: absolute; left: 0; top: 10px;
  width: 6px; height: 1px; background: var(--accent);
}

/* ═══════════════════════════════════════════
   CONTACT
═══════════════════════════════════════════ */
.contact-layout { display: grid; grid-template-columns: 1fr 1.3fr; gap: 64px; align-items: start; }
.contact-left h3 {
  font-family: var(--f-display); font-size: 24px; color: var(--ink);
  margin-bottom: 14px;
}
.contact-left p { font-size: 15px; color: var(--ink-3); line-height: 1.8; margin-bottom: 32px; }
.contact-links { display: flex; flex-direction: column; gap: 16px; }
.cl-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px; background: var(--white);
  border: 1px solid var(--rule); border-radius: var(--r2);
  box-shadow: var(--sh); transition: border-color .2s, box-shadow .2s;
}
.cl-item:hover { border-color: var(--accent-md); box-shadow: var(--sh2); }
.cl-ico {
  width: 40px; height: 40px; flex-shrink: 0;
  border-radius: var(--r); background: var(--accent-lt);
  display: grid; place-items: center; font-size: 18px;
}
.cl-label { font-size: 11px; color: var(--ink-3); font-weight: 500; margin-bottom: 2px; }
.cl-val   { font-size: 14px; color: var(--ink); font-weight: 500; }

/* FORM */
.form-box {
  background: var(--white); border: 1px solid var(--rule);
  border-radius: var(--r2); padding: 40px; box-shadow: var(--sh);
}
.form-title { font-family: var(--f-display); font-size: 20px; color: var(--ink); margin-bottom: 28px; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.f-field { margin-bottom: 18px; }
.f-label {
  display: block; font-size: 12.5px; font-weight: 600;
  color: var(--ink); margin-bottom: 7px; letter-spacing: .01em;
}
.f-input, .f-select, .f-textarea {
  width: 100%; padding: 12px 15px;
  font-family: var(--f-body); font-size: 14px; color: var(--ink);
  background: var(--surface); border: 1.5px solid var(--rule);
  border-radius: var(--r); outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.f-input:focus, .f-select:focus, .f-textarea:focus {
  border-color: var(--accent); background: var(--white);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
.f-textarea { min-height: 120px; resize: vertical; }
.f-submit {
  width: 100%; padding: 14px;
  font-family: var(--f-body); font-size: 15px; font-weight: 600;
  background: var(--ink); color: var(--white);
  border: none; border-radius: var(--r); cursor: pointer;
  transition: background .2s, transform .15s, box-shadow .2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.f-submit:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,99,235,.3); }
.f-submit:active { transform: none; }
.f-success {
  display: none;
  background: var(--success-lt); border: 1px solid #a7f3d0;
  border-radius: var(--r); padding: 16px 20px; margin-top: 16px;
  color: #065f46; font-size: 14px; font-weight: 500; text-align: center;
}

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
footer {
  background: var(--ink); padding: 40px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-brand {
  font-family: var(--f-display); font-size: 18px; color: rgba(255,255,255,.9);
  letter-spacing: -.2px;
}
.footer-copy { font-size: 13px; color: rgba(255,255,255,.4); }
.footer-links { display: flex; gap: 20px; }
.footer-links a { font-size: 13px; color: rgba(255,255,255,.5); transition: color .2s; }
.footer-links a:hover { color: var(--white); }

/* ═══════════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════════ */
.reveal {
  opacity: 0; transform: translateY(28px);
  transition: opacity .6s ease, transform .6s ease;
}
.reveal.in { opacity: 1; transform: none; }
.reveal-delay-1 { transition-delay: .1s; }
.reveal-delay-2 { transition-delay: .2s; }
.reveal-delay-3 { transition-delay: .3s; }

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 900px) {
  .wrap { padding: 0 24px; }
  #nav { padding: 0 24px; }
  footer { padding: 32px 24px; flex-direction: column; gap: 20px; text-align: center; }
  .about-layout, .contact-layout { grid-template-columns: 1fr; gap: 40px; }
  .skills-wrap { grid-template-columns: 1fr 1fr; }
  .projects-grid { grid-template-columns: 1fr; }
  .proj-card:first-child { grid-column: span 1; grid-template-columns: 1fr; }
  .hero-metrics { flex-direction: column; border-radius: var(--r); }
  .metric { border-right: none; border-bottom: 1px solid var(--rule); }
  .metric:last-child { border-bottom: none; }
  .section { padding: 72px 0; }
}
@media (max-width: 600px) {
  .nav-links { display: none; }
  .skills-wrap { grid-template-columns: 1fr; }
  .f-row { grid-template-columns: 1fr; }
  .hero-actions { flex-direction: column; align-items: center; }
  #hero { padding: 100px 24px 60px; }
}
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
  .sk-bar-fill { transition: none; }
  .nav-dot { animation: none; }
}
</style>
</head>
<body>

<!-- ══════════════ NAV ══════════════ -->
<nav id="nav">
  <div class="nav-brand">
    <div class="nav-dot"></div>
    Ganesh Gosangi
  </div>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#experience">Experience</a>
    <a href="#contact" class="nav-cta">Hire Me</a>
  </div>
</nav>

<!-- ══════════════ HERO ══════════════ -->
<section id="hero">
  <div class="hero-inner">
    <div class="hero-chip">
      <div class="hero-chip-dot"></div>
      Available for full-tim
